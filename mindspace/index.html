<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마음공간 — AI 감정 케어</title>
<meta name="description" content="마음대로 안 될 때, 혼자서 버티지 않아도 되도록. AI 기반 감정 케어 서비스">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&family=Gowun+Dodum&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- WELCOME SCREEN -->
<div class="screen active" id="welcome">
  <div class="logo-ring">
    <svg viewBox="0 0 40 40" fill="none">
      <circle cx="20" cy="20" r="14" stroke="#7A9E7E" stroke-width="1.5"/>
      <path d="M20 10 C20 10, 26 16, 26 22 C26 28, 14 28, 14 22 C14 16, 20 10, 20 10Z" fill="#B8D4BA" fill-opacity="0.7"/>
      <circle cx="20" cy="23" r="3" fill="#7A9E7E" fill-opacity="0.5"/>
    </svg>
  </div>

  <div class="welcome-title">잠깐, 숨 한번 쉬어요</div>
  <div class="welcome-sub">
    지금 어떤 마음인지 알려주세요.<br>
    당신만을 위한 마음 공간을 열어드릴게요.
  </div>

  <div class="emotion-grid" id="emotionGrid">
    <button class="emotion-btn" data-emotion="답답함" onclick="selectEmotion(this)">
      <span class="emotion-icon">😮‍💨</span><span>답답함</span>
    </button>
    <button class="emotion-btn" data-emotion="화남" onclick="selectEmotion(this)">
      <span class="emotion-icon">😤</span><span>화남</span>
    </button>
    <button class="emotion-btn" data-emotion="슬픔" onclick="selectEmotion(this)">
      <span class="emotion-icon">😢</span><span>슬픔</span>
    </button>
    <button class="emotion-btn" data-emotion="불안함" onclick="selectEmotion(this)">
      <span class="emotion-icon">😰</span><span>불안함</span>
    </button>
    <button class="emotion-btn" data-emotion="지침" onclick="selectEmotion(this)">
      <span class="emotion-icon">😩</span><span>지침</span>
    </button>
    <button class="emotion-btn" data-emotion="억울함" onclick="selectEmotion(this)">
      <span class="emotion-icon">😣</span><span>억울함</span>
    </button>
  </div>

  <button class="start-btn" id="startBtn" onclick="startApp()">마음 공간 열기</button>
</div>

<!-- MAIN APP -->
<div class="screen" id="app">
  <div class="top-bar">
    <div class="top-bar-left">
      <button class="back-btn" onclick="goBack()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M11 4L6 9L11 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
      <span class="app-title">마음공간</span>
    </div>
    <span class="mood-tag" id="moodTag"></span>
  </div>

  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('chat', this)">
      <span class="nav-tab-icon">💬</span><span>대화</span>
    </button>
    <button class="nav-tab" onclick="switchTab('breathe', this)">
      <span class="nav-tab-icon">🌿</span><span>호흡</span>
    </button>
    <button class="nav-tab" onclick="switchTab('journal', this)">
      <span class="nav-tab-icon">📖</span><span>기록</span>
    </button>
  </div>

  <!-- CHAT -->
  <div class="panel active" id="panel-chat">
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
      <textarea class="chat-input" id="chatInput"
        placeholder="지금 마음을 털어놓아요..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
          <path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- BREATHE -->
  <div class="panel" id="panel-breathe">
    <div class="breathe-title">마음을 고르는 호흡</div>
    <div class="breathe-ring-wrap">
      <div class="breathe-ripple"></div>
      <div class="breathe-ripple"></div>
      <div class="breathe-ripple"></div>
      <div class="breathe-circle" id="breatheCircle" onclick="startBreathe()">시작</div>
    </div>
    <div class="breathe-phase" id="breathePhase">원을 누르면 시작해요</div>
    <div class="breathe-count" id="breatheCount"></div>
    <div class="breathe-controls">
      <button class="breathe-ctrl-btn" onclick="resetBreathe()">다시 시작</button>
      <button class="breathe-ctrl-btn primary" onclick="startBreathe()">시작하기</button>
    </div>
  </div>

  <!-- JOURNAL -->
  <div class="panel" id="panel-journal">
    <div class="journal-header">지금 마음을 적어요</div>
    <textarea class="journal-textarea" id="journalText"
      placeholder="오늘 어떤 일이 있었나요? 마음에 걸리는 것들을 자유롭게 적어보세요. 판단 없이 들을게요..."></textarea>
    <div class="journal-actions">
      <button class="j-btn" onclick="clearJournal()">지우기</button>
      <button class="j-btn primary" onclick="analyzeJournal()">AI 인사이트 받기</button>
    </div>
    <div class="journal-insight" id="journalInsight">
      <div class="insight-label">AI 인사이트</div>
      <div id="insightText"></div>
    </div>
    <div class="affirmation-section">
      <div class="section-label">오늘의 위로 카드</div>
      <div class="affirmation-cards" id="affirmationCards"></div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
